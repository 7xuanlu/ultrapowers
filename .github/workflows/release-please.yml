name: release-please

# Automates releases from Conventional Commits on main: opens a release PR that bumps
# the version (package.json, .claude-plugin/plugin.json, .claude-plugin/marketplace.json) and
# updates CHANGELOG.md; merging that PR tags the version and cuts the GitHub Release.
#
# NOTE: this repo squash-merges PRs, so release-please only sees the squash-commit TITLE on
# main. Squash titles must be Conventional Commits (feat:, fix:, docs:, chore: ...) or no
# release is proposed. See CONTRIBUTING.md.
#
# The marketplace notify is folded in as an inline step (gated on release_created) rather than
# a separate `release: published` workflow: releases created by GITHUB_TOKEN do not trigger
# downstream `release:` workflows, so a standalone notifier would never fire.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        # release-please-action@v4 (rp 17.3.0) can throw a blank `release-please failed:` in
        # its PR-creation phase AFTER it has already cut the release and set its outputs
        # (observed: run 28116717892 for v0.4.1 — release tagged, then a blank-message throw).
        # The release work itself succeeds, so don't let that spurious non-zero exit fail the
        # job or suppress the notify below. The reliable signal is the release_created output,
        # which is set before the throw; gate on that.
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # On a published release, tell the claude-plugins marketplace to re-sync pins.
      # The marketplace's sync-marketplace workflow re-derives every plugin's pin itself,
      # so this only needs to fire the dispatch (the client_payload is informational).
      # Cross-repo dispatch needs a PAT (MARKETPLACE_SYNC_TOKEN); GITHUB_TOKEN can't reach it.
      #
      # `!cancelled()` overrides the success() GitHub auto-applies to any `if:` lacking a status
      # function: without it a failed release step would skip this even though the release (and
      # release_created) were already set. release_created == 'true' keeps it firing only on a
      # real release. The nightly sync-marketplace cron is the backstop if this ever misses.
      - name: Notify marketplace
        if: ${{ !cancelled() && steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_SYNC_TOKEN }}
        run: |
          gh api repos/7xuanlu/claude-plugins/dispatches \
            -f event_type=plugin-released \
            -F "client_payload[plugin]=ultrapowers" \
            -F "client_payload[tag]=${{ steps.release.outputs.tag_name }}"
